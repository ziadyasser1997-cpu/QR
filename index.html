<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مبروك كسبت مشروب هدية</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f3f6ff 0%, #ffffff 100%);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #1f2937;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.1);
            max-width: 540px;
            width: 100%;
            padding: 32px;
        }
        .emoji {
            font-size: 64px;
            margin-bottom: 18px;
        }
        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 0.03em;
            line-height: 1.1;
        }
        p {
            margin: 18px 0 0;
            line-height: 1.8;
            font-size: 1.1rem;
        }
        .subtitle {
            color: #4b5563;
            font-weight: 500;
        }
        .description {
            margin-top: 24px;
            color: #334155;
            font-size: 1rem;
            line-height: 1.8;
            max-width: 460px;
            margin-left: auto;
            margin-right: auto;
        }
        .highlight {
            color: #0b74de;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🎉🥤</div>
        <h1>مبروك، كسبت مشروب هدية</h1>
        <p class="subtitle">Congratulations, you won a free drink</p>
    </div>

     <script>
        (function () {
            const key = 'oneTimeVisit2026';
            try {
                if (localStorage.getItem(key)) {
                    document.body.innerHTML = `
                        <div class="card">
                            <div class="emoji">🔒</div>
                            <h1>تم الدخول من قبل</h1>
                            <p class="subtitle">لا يمكنك فتح هذه الصفحة مرة أخرى من نفس المتصفح</p>
                        </div>
                    `;
                    return;
                }

                localStorage.setItem(key, 'true');
            } catch (error) {
                console.warn('One-time visit check failed:', error);
            }
        })();
    </script>
</body>
</html>
